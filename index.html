<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Spanish with Natives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: linear-gradient(135deg, #FFE9C7 0%, #FFB76B 45%, #F39200 100%);
      background-attachment: fixed;
      color: #1a1a1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      max-width: 640px;
      width: 100%;
    }

    .logo {
      display: block;
      max-width: 560px;
      width: 100%;
      height: auto;
      margin: 0 auto 2.5rem;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 40px;
      font-weight: 600;
      line-height: 1.15;
      color: #1a1a1a;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    .subhead {
      font-size: 1.125rem;
      color: #6b6b6b;
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    form {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
      max-width: 460px;
      margin: 0 auto;
    }

    input[type="email"] {
      flex: 1;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.85rem 1.1rem;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input[type="email"]:focus {
      border-color: #F39200;
    }

    button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
      background-color: #ffffff;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      white-space: nowrap;
    }

    button:hover {
      background-color: #f2f2f2;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 32px;
      }

      form {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="assets/img/logo.png" alt="Learn Spanish" />
    <h1>Learn Spanish with actual Natives.</h1>
    <p class="subhead">Coming soon...</p>
    <form action="#">
      <input type="email" placeholder="Enter your email" aria-label="Email address" required />
      <button type="submit">Subscribe</button>
    </form>
  </div>
</body>
</html>
