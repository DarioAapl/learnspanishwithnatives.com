<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Spanish with Natives</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #FAF6EF;
      color: #6B0F0F;
      font-family: 'Fraunces', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 640px;
    }

    p {
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      opacity: 0.7;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/img/logo.png" alt="Learn Spanish with Natives" style="max-width: 220px; width: 100%; margin-bottom: 1.5rem;" />
    <p>Coming soon.</p>
  </div>
</body>
</html>
